.permission-popups {
  z-index: 90;
  pointer-events: none;
  flex-direction: column;
  gap: 12px;
  width: min(360px, 100vw - 40px);
  display: flex;
  position: fixed;
  top: 20px;
  right: 20px;
}

.permission-popup {
  pointer-events: auto;
  background: linear-gradient(150deg, #fefefe 0%, #f5f5f5 100%);
  border: 1px solid #111;
  border-radius: 12px;
  padding: 12px;
  animation: .18s ease-out permission-popup-in;
  box-shadow: 0 18px 36px #00000024;
}

.permission-popup__badge {
  letter-spacing: .08em;
  text-transform: uppercase;
  color: #4c4c4c;
  background: #fff;
  border: 1px solid #d8d8d8;
  border-radius: 999px;
  align-items: center;
  padding: 3px 8px;
  font-size: 10px;
  font-weight: 700;
  display: inline-flex;
}

.permission-popup__summary {
  color: #141414;
  margin: 9px 0 0;
  font-size: 13px;
  line-height: 1.45;
}

.permission-popup__container {
  font-weight: 700;
}

.permission-popup__action {
  font-family: var(--font-mono);
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 6px;
  padding: 2px 6px;
  font-size: 11px;
}

.permission-popup__scope {
  color: #5f5f5f;
  margin: 7px 0 0;
  font-size: 11px;
}

.permission-popup__scope code {
  font-family: var(--font-mono);
}

.permission-popup__actions {
  justify-content: flex-end;
  gap: 8px;
  margin-top: 10px;
  display: flex;
}

.permission-popup__button {
  cursor: pointer;
  border: 1px solid #111;
  border-radius: 9px;
  padding: 7px 11px;
  font-size: 12px;
  font-weight: 700;
  transition: transform .13s, opacity .13s, background-color .13s;
}

.permission-popup__button:hover {
  transform: translateY(-1px);
}

.permission-popup__button:active {
  transform: translateY(0);
}

.permission-popup__button--deny {
  color: #111;
  background: #fff;
  border-color: #d0d0d0;
}

.permission-popup__button--approve {
  color: #fff;
  background: #111;
}

@keyframes permission-popup-in {
  from {
    opacity: 0;
    transform: translateY(-8px)scale(.98);
  }

  to {
    opacity: 1;
    transform: translateY(0)scale(1);
  }
}

@media (max-width: 640px) {
  .permission-popups {
    width: auto;
    top: 12px;
    left: 12px;
    right: 12px;
  }
}
